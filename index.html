<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Absensi QR Laboratorium</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }

    /* Kop Judul Institusi */
    .header-institusi {
      text-align: center;
      padding-top: 15px;
      padding-bottom: 15px;
      margin-bottom: 25px;
      border-bottom: 3px double #0d6efd;
    }
    .header-institusi h2 {
      font-size: 1.4rem;
      font-weight: bold;
      color: #0b3994;
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    .header-institusi h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 2px;
    }
    .header-institusi h4 {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0;
    }
    
    /* Wadah Utama Kamera */
    #reader { 
      width: 100%; 
      max-width: 450px; 
      margin: 15px auto; 
      border: 2px dashed #6c757d !important; 
      padding: 10px;
      border-radius: 10px;
      background-color: #ffffff;
      min-height: 320px;
      position: relative; 
      overflow: hidden;
    }

    /* Lapisan Overlay yang Memblokir Kamera */
    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999; 
      padding: 20px;
      text-align: center;
    }
    
    .bg-proses { background-color: rgba(255, 255, 255, 0.95); color: #0d6efd; }
    .bg-sukses { background-color: #d1e7dd; color: #0f5132; }
    .bg-gagal { background-color: #f8d7da; color: #842029; }

    .scanner-overlay p {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 10px;
      line-height: 1.4;
    }

    #reader video { width: 100% !important; border-radius: 8px; object-fit: cover; }


    /* Style komponen rangkuman info di atas kamera */
    .info-log-box {
      background-color: #e9ecef;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.95rem;
      max-width: 450px;
      margin: 0 auto 15px auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container py-3">

  <div class="header-institusi">
    <h2>Kunjungan Laboratorium</h2>
    <h3>Program Studi Kedokteran Program Sarjana</h3>
    <h4>Fakultas Kedokteran dan Ilmu Kesehatan | Universitas Lambung Mangkurat</h4>
  </div>
<div class="container py-4">
  <div class="card shadow-sm mb-4" id="setupSection">
    <div class="card-header bg-primary text-white"><h5 class="mb-0">1. Pengaturan Log Laboratorium</h5></div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Pilih Laboratorium</label>
        <select id="lab" class="form-select">
          <option value="">Memuat daftar lab...</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Pilih Keperluan</label>
        <select id="keperluan" class="form-select">
          <option value="">Memuat daftar keperluan...</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Deskripsi Tambahan / Catatan</label>
        <textarea id="deskripsi" class="form-control" rows="2" placeholder="Catatan tambahan (opsional)..."></textarea>
      </div>
      <button type="button" class="btn btn-success w-100" onclick="lockSetting()">Kunci & Mulai Scan</button>
    </div>
  </div>

  <div class="card shadow-sm d-none" id="scannerSection">
    <div class="card-header bg-dark text-white"><h5 class="mb-0">2. Area Scan QR Code</h5></div>
    <div class="card-body text-center">
      
      <div class="info-log-box shadow-sm border-start border-primary border-3">
        <div class="row g-2">
          <div class="col-12">
            <span class="badge bg-primary me-1">Lab</span> 
            <strong id="displayLab">-</strong>
          </div>
          <div class="col-12">
            <span class="badge bg-secondary me-1">Keperluan</span> 
            <strong id="displayKeperluan">-</strong>
          </div>
          <div class="col-12" id="boxDisplayCatatan">
            <span class="badge bg-dark me-1">Catatan</span> 
            <span id="displayCatatan" class="text-muted italic">-</span>
          </div>
        </div>
      </div>
      
      <div id="reader"></div>
      
      <div id="notifManual" class="alert d-none mt-3"></div>
      
      <div class="input-group mb-3 mt-4">
        <input type="text" id="manualNim" class="form-control" placeholder="Input NIM manual jika QR rusak">
        <button class="btn btn-secondary" type="button" onclick="inputManual()">Submit Manual</button>
      </div>
      
      <button class="btn btn-warning btn-sm" onclick="unlockSetting()">Ubah Pengaturan Awal</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwM0RJ6qvs-bAKx9FNtOP96sT6RB8ym8Hglq-wJhPLbtted66dvgcUhe1j-IRWbnopt/exec"; 

  let html5Qrcode; 
  let isProcessing = false;

  window.onload = function() {
    muatOpsiDariSheets();
  };

  function muatOpsiDariSheets() {
    fetch(`${WEB_APP_URL}?getOptions=true`)
      .then(response => response.json())
      .then(data => {
        const selectLab = document.getElementById("lab");
        const selectKeperluan = document.getElementById("keperluan");

        selectLab.innerHTML = '<option value="">-- Pilih Laboratorium --</option>';
        selectKeperluan.innerHTML = '<option value="">-- Pilih Keperluan --</option>';

        if (data.labs && data.labs.length > 0) {
          data.labs.forEach(l => { selectLab.innerHTML += `<option value="${l}">${l}</option>`; });
        }
        if (data.keperluans && data.keperluans.length > 0) {
          data.keperluans.forEach(k => { selectKeperluan.innerHTML += `<option value="${k}">${k}</option>`; });
        }
      })
      .catch(err => {
        console.error("Gagal sinkronisasi data:", err);
        document.getElementById("lab").innerHTML = '<option value="LAB ANATOMI">LAB ANATOMI</option><option value="LAB FARMA">LAB FARMA</option>';
        document.getElementById("keperluan").innerHTML = '<option value="PRAKTIKUM">PRAKTIKUM</option><option value="SKRIPSI">SKRIPSI</option>';
      });
  }

  function startScanner() {
    html5Qrcode = new Html5Qrcode("reader");
    html5Qrcode.start(
      { facingMode: "environment" }, 
      { fps: 15, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      html5Qrcode.start({ facingMode: "user" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure)
      .catch(e => alert("Gagal mengakses kamera: " + e.message));
    });
  }

  function lockSetting() {
    let labVal = document.getElementById('lab').value;
    let kepVal = document.getElementById('keperluan').value;
    let deskVal = document.getElementById('deskripsi').value.trim();

    if(!labVal || !kepVal) {
      alert('Mohon pastikan Lab dan Keperluan sudah terpilih!');
      return;
    }

    // 📌 TEMPELKAN TEKS PILIHAN KE BOX ATAS KAMERA SEBELUM PINDAH HALAMAN
    document.getElementById('displayLab').innerText = labVal;
    document.getElementById('displayKeperluan').innerText = kepVal;
    
    if(deskVal !== "") {
      document.getElementById('displayCatatan').innerText = deskVal;
      document.getElementById('boxDisplayCatatan').classList.remove('d-none');
    } else {
      document.getElementById('boxDisplayCatatan').classList.add('d-none'); // Sembunyikan baris catatan jika kosong
    }

    document.getElementById('setupSection').classList.add('d-none');
    document.getElementById('scannerSection').classList.remove('d-none');
    startScanner();
  }

  function onScanSuccess(decodedText, decodedResult) {
    if(decodedText && !isProcessing) {
      isProcessing = true;
      let nimMhs = decodedText.trim();
      
      document.getElementById('notifManual').classList.add('d-none');

      const readerDiv = document.getElementById('reader');
      readerDiv.innerHTML += `
        <div id="cameraOverlay" class="scanner-overlay bg-proses">
          <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
          <p>Sedang Memproses...<br><span class="text-muted" style="font-size:0.9rem;">NIM: ${nimMhs}</span></p>
        </div>
      `;
      
      if(html5Qrcode && html5Qrcode.isScanning) {
        html5Qrcode.stop().then(() => {
          kirimDataAbsen(nimMhs, true); 
        }).catch(err => {
          kirimDataAbsen(nimMhs, true);
        });
      } else {
        kirimDataAbsen(nimMhs, true);
      }
    }
  }

  function onScanFailure(error) {
    // Membiarkan frame mencari QR terus
  }

  function inputManual() {
    let nim = document.getElementById('manualNim').value.trim();
    if(nim === "") { alert("Isi NIM terlebih dahulu!"); return; }
    
    kirimDataAbsen(nim, false); 
    document.getElementById('manualNim').value = "";
  }

  function unlockSetting() {
    if(html5Qrcode && html5Qrcode.isScanning) {
      html5Qrcode.stop().then(() => {
        document.getElementById('reader').innerHTML = "";
        document.getElementById('setupSection').classList.remove('d-none');
        document.getElementById('scannerSection').classList.add('d-none');
        document.getElementById('notifManual').classList.add('d-none');
      });
    } else {
      document.getElementById('reader').innerHTML = "";
      document.getElementById('setupSection').classList.remove('d-none');
      document.getElementById('scannerSection').classList.add('d-none');
      document.getElementById('notifManual').classList.add('d-none');
    }
  }

  function kirimDataAbsen(nimMhs, isFromCamera) {
    let labVal = document.getElementById('lab').value;
    let kepVal = document.getElementById('keperluan').value;
    let deskVal = document.getElementById('deskripsi').value;
    
    let notifManualDiv = document.getElementById('notifManual');
    let overlayDiv = document.getElementById('cameraOverlay');

    if (!isFromCamera) {
      notifManualDiv.className = "alert alert-warning";
      notifManualDiv.innerText = "Sedang memproses input manual NIM: " + nimMhs + "...";
      notifManualDiv.classList.remove('d-none');
    }

    const urlKirim = `${WEB_APP_URL}?nim=${encodeURIComponent(nimMhs)}&lab=${encodeURIComponent(labVal)}&keperluan=${encodeURIComponent(kepVal)}&catatan=${encodeURIComponent(deskVal)}`;

    fetch(urlKirim)
      .then(response => response.json())
      .then(respon => {
        if(respon.status === "success") {
          if (navigator.vibrate) { navigator.vibrate(200); }

          if (isFromCamera && overlayDiv) {
            overlayDiv.className = "scanner-overlay bg-sukses";
            overlayDiv.innerHTML = `<span style="font-size: 3.5rem;">✅</span><p>${respon.pesan}</p>`;
          } else {
            notifManualDiv.className = "alert alert-success";
            notifManualDiv.innerText = respon.pesan;
          }
        } else {
          if (isFromCamera && overlayDiv) {
            overlayDiv.className = "scanner-overlay bg-gagal";
            overlayDiv.innerHTML = `<span style="font-size: 3.5rem;">❌</span><p>Gagal: ${respon.pesan}</p>`;
          } else {
            notifManualDiv.className = "alert alert-danger";
            notifManualDiv.innerText = respon.pesan;
          }
        }

        // REFRESH KAMERA OTOMATIS JEDA 2 DETIK
        if(isFromCamera) {
          setTimeout(() => {
            document.getElementById('reader').innerHTML = ""; 
            startScanner(); 
            isProcessing = false;
          }, 2000); // Kunci 2 detik sesuai modifikasi sebelumnya
        } else {
          isProcessing = false;
        }
      })
      .catch(err => {
        console.error(err);
        if (isFromCamera && overlayDiv) {
          overlayDiv.className = "scanner-overlay bg-gagal";
          overlayDiv.innerHTML = `<span style="font-size: 3.5rem;">❌</span><p>Koneksi ke Google Sheets Terputus!</p>`;
          setTimeout(() => {
            document.getElementById('reader').innerHTML = "";
            startScanner();
            isProcessing = false;
          }, 2000);
        } else {
          notifManualDiv.className = "alert alert-danger";
          notifManualDiv.innerText = "Gagal terhubung ke server Google Sheets.";
          isProcessing = false;
        }
      });
  }
</script>
</body>
</html>
