<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Absensi QR Laboratorium</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    #reader { 
      width: 100%; 
      max-width: 450px; 
      margin: 15px auto; 
      border: 2px dashed #6c757d !important; 
      padding: 10px;
      border-radius: 10px;
      background-color: #ffffff;
      min-height: 300px;
      position: relative;
      transition: background-color 0.3s ease;
      overflow: hidden;
    }
    .scan-success-flash {
      background-color: #d1e7dd !important;
      border-color: #198754 !important;
    }
    .scanner-overlay-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 1.25rem; font-weight: bold; width: 90%; text-align: center; z-index: 100;
    }
    /* Menyembunyikan tombol log bawaan library yang mengganggu */
    #reader video { width: 100% !important; border-radius: 8px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="card shadow-sm mb-4" id="setupSection">
    <div class="card-header bg-primary text-white"><h5 class="mb-0">1. Pengaturan Log Laboratorium</h5></div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Pilih Laboratorium</label>
        <select id="lab" class="form-select">
          <option value="">Memuat daftar lab...</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Pilih Keperluan</label>
        <select id="keperluan" class="form-select">
          <option value="">Memuat daftar keperluan...</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Deskripsi Tambahan / Catatan</label>
        <textarea id="deskripsi" class="form-control" rows="2" placeholder="Catatan tambahan (opsional)..."></textarea>
      </div>
      <button type="button" class="btn btn-success w-100" onclick="lockSetting()">Kunci & Mulai Scan</button>
    </div>
  </div>

  <div class="card shadow-sm d-none" id="scannerSection">
    <div class="card-header bg-dark text-white"><h5 class="mb-0">2. Area Scan QR Code</h5></div>
    <div class="card-body text-center">
      <div class="alert alert-info py-2 mb-3">Arahkan QR Code Anda ke dalam kotak kamera di bawah.</div>
      
      <div id="reader"></div>
      
      <div id="notif" class="alert d-none mt-3"></div>
      
      <div class="input-group mb-3 mt-4">
        <input type="text" id="manualNim" class="form-control" placeholder="Input NIM manual jika QR rusak">
        <button class="btn btn-secondary" type="button" onclick="inputManual()">Submit Manual</button>
      </div>
      
      <button class="btn btn-warning btn-sm" onclick="unlockSetting()">Ubah Pengaturan Awal</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwM0RJ6qvs-bAKx9FNtOP96sT6RB8ym8Hglq-wJhPLbtted66dvgcUhe1j-IRWbnopt/exec"; 

  let html5Qrcode; // Menggunakan objek Lensa Murni murni tanpa UI template bawaan
  let isProcessing = false;

  window.onload = function() {
    muatOpsiDariSheets();
  };

  function muatOpsiDariSheets() {
    fetch(`${WEB_APP_URL}?getOptions=true`)
      .then(response => response.json())
      .then(data => {
        const selectLab = document.getElementById("lab");
        const selectKeperluan = document.getElementById("keperluan");

        selectLab.innerHTML = '<option value="">-- Pilih Laboratorium --</option>';
        selectKeperluan.innerHTML = '<option value="">-- Pilih Keperluan --</option>';

        if (data.labs && data.labs.length > 0) {
          data.labs.forEach(l => { selectLab.innerHTML += `<option value="${l}">${l}</option>`; });
        }
        if (data.keperluans && data.keperluans.length > 0) {
          data.keperluans.forEach(k => { selectKeperluan.innerHTML += `<option value="${k}">${k}</option>`; });
        }
      })
      .catch(err => {
        console.error("Gagal sinkronisasi data:", err);
        document.getElementById("lab").innerHTML = '<option value="LAB ANATOMI">LAB ANATOMI</option><option value="LAB FARMA">LAB FARMA</option>';
        document.getElementById("keperluan").innerHTML = '<option value="PRAKTIKUM">PRAKTIKUM</option><option value="SKRIPSI">SKRIPSI</option>';
      });
  }

  function startScanner() {
    // Inisialisasi menggunakan "Html5Qrcode" (bukan Html5QrcodeScanner) agar kontrol start/stop 100% mutlak di tangan kita
    html5Qrcode = new Html5Qrcode("reader");
    
    html5Qrcode.start(
      { facingMode: "environment" }, // Menggunakan kamera belakang otomatis
      {
        fps: 15,
        qrbox: { width: 250, height: 250 }
      },
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      // Fallback jika mode environment gagal, coba buka kamera apa saja yang tersedia
      html5Qrcode.start({ facingMode: "user" }, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess, onScanFailure)
      .catch(e => alert("Gagal mengakses kamera: " + e.message));
    });
  }

  function lockSetting() {
    if(!document.getElementById('lab').value || !document.getElementById('keperluan').value) {
      alert('Mohon pastikan Lab dan Keperluan sudah terpilih!');
      return;
    }
    document.getElementById('setupSection').classList.add('d-none');
    document.getElementById('scannerSection').classList.remove('d-none');
    startScanner();
  }

  function onScanSuccess(decodedText, decodedResult) {
    if(decodedText && !isProcessing) {
      isProcessing = true;
      
      const readerDiv = document.getElementById('reader');
      readerDiv.classList.add('scan-success-flash');
      
      let nimMhs = decodedText.trim();
      
      // HENTIKAN KAMERA SEGERA SECARA TOTAL
      if(html5Qrcode && html5Qrcode.isScanning) {
        html5Qrcode.stop().then(() => {
          readerDiv.innerHTML = `<div class="scanner-overlay-msg text-primary"><div class="spinner-border text-primary mb-2" role="status"></div><br>Menghubungkan ke Sheets...<br>NIM: ${nimMhs}</div>`;
          kirimDataAbsen(nimMhs, true);
        }).catch(err => {
          console.error("Gagal stop kamera:", err);
          kirimDataAbsen(nimMhs, false);
        });
      } else {
        kirimDataAbsen(nimMhs, false);
      }
    }
  }

  function onScanFailure(error) {
    // Frame pencarian berjalan terus
  }

  function unlockSetting() {
    if(html5Qrcode && html5Qrcode.isScanning) {
      html5Qrcode.stop().then(() => {
        resetReaderBox();
        document.getElementById('setupSection').classList.remove('d-none');
        document.getElementById('scannerSection').classList.add('d-none');
      });
    } else {
      resetReaderBox();
      document.getElementById('setupSection').classList.remove('d-none');
      document.getElementById('scannerSection').classList.add('d-none');
    }
  }

  function inputManual() {
    let nim = document.getElementById('manualNim').value.trim();
    if(nim === "") { alert("Isi NIM terlebih dahulu!"); return; }
    kirimDataAbsen(nim, false);
    document.getElementById('manualNim').value = "";
  }

  function resetReaderBox() {
    const readerDiv = document.getElementById('reader');
    readerDiv.className = ""; 
    readerDiv.innerHTML = ""; 
  }

  function kirimDataAbsen(nimMhs, isFromCamera) {
    let labVal = document.getElementById('lab').value;
    let kepVal = document.getElementById('keperluan').value;
    let deskVal = document.getElementById('deskripsi').value;
    let notifDiv = document.getElementById('notif');
    const readerDiv = document.getElementById('reader');
    
    notifDiv.className = "alert alert-warning";
    notifDiv.innerText = "Sedang memproses data NIM: " + nimMhs + "...";
    notifDiv.classList.remove('d-none');

    const urlKirim = `${WEB_APP_URL}?nim=${encodeURIComponent(nimMhs)}&lab=${encodeURIComponent(labVal)}&keperluan=${encodeURIComponent(kepVal)}&catatan=${encodeURIComponent(deskVal)}`;

    fetch(urlKirim)
      .then(response => response.json())
      .then(respon => {
        if(respon.status === "success") {
          notifDiv.className = "alert alert-success";
          if (navigator.vibrate) { navigator.vibrate(200); }
          
          if(isFromCamera) {
            readerDiv.innerHTML = `<div class="scanner-overlay-msg text-success"><span style="font-size: 3rem;">✅</span><br><span style="font-size: 1.15rem;">${respon.pesan}</span></div>`;
          }
        } else {
          notifDiv.className = "alert alert-danger";
          if(isFromCamera) {
            readerDiv.innerHTML = `<div class="scanner-overlay-msg text-danger"><span style="font-size: 3rem;">❌</span><br>Gagal: ${respon.pesan}</div>`;
          }
        }
        notifDiv.innerText = respon.pesan;

        // JEDA REFRESH: Tampilkan status sukses besar selama 3 detik, lalu kamera menyala lagi otomatis
        if(isFromCamera) {
          setTimeout(() => {
            resetReaderBox();
            startScanner();
            isProcessing = false;
          }, 3000);
        } else {
          isProcessing = false;
        }
      })
      .catch(err => {
        console.error(err);
        notifDiv.className = "alert alert-danger";
        notifDiv.innerText = "Gagal terhubung ke server Google Sheets.";
        
        if
